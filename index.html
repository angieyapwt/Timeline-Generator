<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Property Timeline Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css?v=20260626p" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <div>
          <h1>Timeline Generator</h1>
          <p class="hero-copy">Plan HDB and private sale or purchase milestones with reverse CPF refund buffer checks.</p>
        </div>
        <div class="agent-card">
          <span>Prepared by</span>
          <strong>Angie Yap</strong>
          <span>83963088 | CEA No.: R067805D</span>
        </div>
      </section>

      <section class="workspace">
        <aside class="controls-panel">
          <div class="panel-block">
            <label for="scenario">Timeline type</label>
            <select id="scenario"></select>
          </div>

          <div class="mode-row">
            <button class="mode-button active" type="button" data-mode="forward">Forward</button>
            <button class="mode-button" type="button" data-mode="reverse">Reverse</button>
          </div>

          <div class="assumption-strip">
            <label class="toggle-line">
              <input id="skipWeekends" type="checkbox" checked />
              <span>Skip weekends for day-based steps</span>
            </label>
            <label class="toggle-line">
              <input id="includeBuffer" type="checkbox" checked />
              <span>Require 21-day CPF refund buffer</span>
            </label>
          </div>

          <div class="panel-block" id="forwardInputs"></div>
          <div class="panel-block hidden" id="reverseInputs"></div>

          <details class="advanced" open>
            <summary>Adjust assumptions</summary>
            <div id="assumptions"></div>
          </details>

          <button id="resetDefaults" class="ghost-button reset-button" type="button">Reset</button>
        </aside>

        <section class="timeline-panel">
          <div class="summary-grid" id="summary"></div>
          <div class="checklist-section" id="timelineChecklist"></div>
          <div class="itemized-section">
            <div class="section-heading">
              <p class="eyebrow">Dates</p>
              <h2>Itemised Timeline</h2>
            </div>
            <div id="itemizedTimeline" class="itemized-grid"></div>
          </div>
          <div class="timeline-header">
            <div>
              <p class="eyebrow">Infographic</p>
              <h2 id="timelineTitle">Timeline</h2>
            </div>
            <div class="status-pill" id="bufferStatus">CPF buffer ready</div>
          </div>
          <div id="timelineGraphic" class="timeline-graphic"></div>
          <div class="compare-section" id="comparison"></div>
          <div class="report-actions">
            <button id="downloadPdf" class="primary-button" type="button" onclick="window.timelineDownloadPdf && window.timelineDownloadPdf()">Download PDF</button>
          </div>
        </section>
      </section>
    </main>

    <script type="module" src="app.js?v=20260626p"></script>
  </body>
</html>
